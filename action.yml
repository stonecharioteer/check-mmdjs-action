name: Check Mermaid diagrams
description: Scan Markdown files for Mermaid code fences and fail if any diagram cannot be rendered by mermaid-cli.
author: stonecharioteer
branding:
  icon: check-circle
  color: green

inputs:
  files:
    description: Newline- or comma-separated glob patterns to scan.
    required: false
    default: |
      **/*.md
      **/*.markdown
      **/*.mmd
      **/*.mermaid
  ignore:
    description: Newline- or comma-separated glob patterns to ignore.
    required: false
    default: |
      .git/**
      node_modules/**
  mermaid-cli-version:
    description: Version of @mermaid-js/mermaid-cli to run through npx.
    required: false
    default: latest
  fail-fast:
    description: Stop after the first invalid Mermaid diagram.
    required: false
    default: "false"
  output-dir:
    description: Optional directory where rendered SVGs and extracted .mmd files are kept.
    required: false
    default: ""
  config-file:
    description: Optional Mermaid config JSON file passed to mmdc with --configFile.
    required: false
    default: ""
  puppeteer-config-file:
    description: Optional Puppeteer config JSON file passed to mmdc with --puppeteerConfigFile. A no-sandbox config is generated by default.
    required: false
    default: ""
  mmdc-args:
    description: Extra arguments appended to every mmdc invocation, shell-style split.
    required: false
    default: ""

runs:
  using: node24
  main: dist/index.js
