name: Check Mermaid diagrams
description: Scan Markdown and standalone Mermaid files and fail if any diagram has invalid Mermaid syntax.
author: stonecharioteer
branding:
  icon: check-circle
  color: green

inputs:
  files:
    description: Newline- or comma-separated glob patterns to scan.
    required: false
    default: |
      **/*.md
      **/*.markdown
      **/*.mmd
      **/*.mermaid
  ignore:
    description: Newline- or comma-separated glob patterns to ignore.
    required: false
    default: |
      .git/**
      node_modules/**
  mermaid-version:
    description: Version of the mermaid npm package used for parser API syntax validation. Defaults to latest when unset.
    required: false
    default: ""
  mermaid-cli-version:
    description: Deprecated alias for mermaid-version. Kept for backwards compatibility.
    required: false
    default: ""
  fail-fast:
    description: Stop after the first invalid Mermaid diagram.
    required: false
    default: "false"
  output-dir:
    description: Optional directory where extracted .mmd files are kept.
    required: false
    default: ""
  config-file:
    description: Optional Mermaid config JSON file passed to mermaid.initialize before parsing.
    required: false
    default: ""
  puppeteer-config-file:
    description: Deprecated and ignored. v3 performs syntax-only validation and does not launch Puppeteer or Chrome.
    required: false
    default: ""
  mmdc-args:
    description: Deprecated and ignored. v3 uses Mermaid's parser API instead of mermaid-cli.
    required: false
    default: ""

runs:
  using: node24
  main: dist/index.js
